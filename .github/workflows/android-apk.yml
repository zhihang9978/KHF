name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: APK build variant
        required: true
        default: internaltest
        type: choice
        options:
          - internaltest
          - release
  push:
    branches:
      - main
      - master
      - 'upload/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "cmake;3.10.2.4988404" \
            "ndk;21.4.7075529"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build APK
        env:
          BUILD_VARIANT: ${{ github.event.inputs.build_variant || 'internaltest' }}
        run: |
          if [ "$BUILD_VARIANT" = "release" ]; then
            ./gradlew --no-daemon :TMessagesProj_App:assembleAfatRelease
          else
            ./gradlew --no-daemon :TMessagesProj_App:assembleAfatInternaltest
          fi

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          if [ -f TMessagesProj_App/build/outputs/apk/afat/internaltest/app.apk ]; then
            cp TMessagesProj_App/build/outputs/apk/afat/internaltest/app.apk artifacts/KHF-internaltest.apk
          fi
          if [ -f TMessagesProj_App/build/outputs/apk/afat/release/app.apk ]; then
            cp TMessagesProj_App/build/outputs/apk/afat/release/app.apk artifacts/KHF-release.apk
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.run_number }}
          path: artifacts/*.apk
          if-no-files-found: error
